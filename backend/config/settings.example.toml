# PokeScouter 設定ファイル
# このファイルを settings.toml にコピーしてカスタマイズしてください。
# 未指定の項目はデフォルト値が使われます。

# --- サーバー設定（変更には再起動が必要） ---

[server]
host = "0.0.0.0"
port = 8000
cors_origins = ["*"]

[server.logging]
log_dir = "debug"
max_bytes = 5242880          # 5 MB
backup_count = 3
audit_max_bytes = 2097152    # 2 MB
audit_backup_count = 5

# --- calc-service 接続 ---

[calc_service]
base_url = "http://localhost:3100"
timeout = 5.0                # 秒

# --- OCR エンジン設定（変更には再起動が必要） ---

[ocr.glm]
model_id = "zai-org/GLM-OCR"
max_new_tokens = 512

[ocr.paddle]
det_model = "PP-OCRv5_mobile_det"
rec_model = "PP-OCRv5_mobile_rec"
device = "gpu:0"

# --- 認識設定 ---

[recognition.scene_detector]
template_threshold = 0.80    # テンプレートマッチングの閾値
ocr_threshold = 0.5          # OCR ベース検出の閾値

[recognition.pokemon_matcher]
threshold = 0.60             # ポケモン識別の類似度閾値
margin_threshold = 0.03      # top-1 と top-2 の最低スコア差（これ未満は uncertain=true）
fallback_threshold = 0.50    # threshold 未満時のフォールバック閾値（この値以上なら採用検討）
fallback_margin_min = 0.01   # threshold 未満でフォールバックする際の最小マージン
model = "dinov2_vits14"      # DINOv2 モデル名（再起動必要）

[recognition.party_register]
detection_debounce = 3       # 画面検出に必要な連続フレーム数
detection_debounce_high_conf = 2
high_confidence_threshold = 0.95
detection_timeout_s = 60.0   # 画面検出タイムアウト（秒）

# --- データソース設定 ---

[data]
# --- 使用率データの参照元 ---
# 利用可能なソース:
#   "pokechamdb"       → data/pokechamdb/single.json
#                        (pokechamdb.com: 種族値・実数値・技/持ち物/特性/性格/
#                         努力値配分・チームメイトを網羅。最優先ソース)
#   "pikalytics"       → data/pikalytics/championspreview.json
#   "champions_stats"  → data/champions_stats/single.json
#   "yakkun"           → data/yakkun/single.json
#                        (ポケモン徹底攻略の「人気」技一覧。usage_percent は null。
#                         他ソースに技データが無い時のフォールバック用途)
# 新しいソースを追加する場合は docs/usage-data-sources.md を参照

# デフォルト: usage_source も usage_priority も未設定なら
# `["pokechamdb", "pikalytics", "champions_stats", "yakkun"]` の全ソースを
# フィールドごとにフォールバックマージする (pokechamdb が最優先)。

# (A) 単一ソース指定（後方互換: このキーを明示的に設定すると他ソースは無視される）
# usage_source = "pokechamdb"

# (B) 複数ソースマージ: フィールドごとの優先順位
# 明示的にカスタマイズしたい場合はコメントを外す。未設定なら上記デフォルトが適用。
# [data.usage_priority]
# default = ["pokechamdb", "pikalytics", "champions_stats", "yakkun"]
# natures = ["pokechamdb", "champions_stats"]    # 性格は pokechamdb 優先
# ev_spreads = ["pokechamdb", "champions_stats"] # 努力値も同様

[recognition.scene_state]
top_debounce = 3             # トップレベル遷移のデバウンス
sub_debounce = 2             # サブシーンのデバウンス
sub_revert_count = 3         # サブシーン未検出→リバートの回数
force_cooldown_seconds = 2.0 # 強制遷移後のクールダウン（秒）
